version: "3.9"

services:

  api:
    build: .
    container_name: news_api
    ports:
      - "8000:8000"
    environment:
      - NEWSAPI_KEY=${NEWSAPI_KEY}
    volumes:
      - ./db:/app/db   # persist the SQLite database
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  pipeline:
    build: .
    container_name: news_pipeline
    environment:
      - NEWSAPI_KEY=${NEWSAPI_KEY}
    volumes:
      - ./db:/app/db
    command: python pipeline/flow.py
    depends_on:
      - api
